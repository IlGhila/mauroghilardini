<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Repertorio — Mauro Ghilardini</title>
<meta name="description" content="Il repertorio di Mauro Ghilardini: brani, concerti e progetti musicali. Una panoramica dei lavori e delle produzioni.">
<link rel="canonical" href="https://mauroghilardini.netlify.app/repertorio/">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Mauro Ghilardini">
<meta property="og:locale" content="it_IT">
<meta property="og:title" content="Repertorio — Mauro Ghilardini">
<meta property="og:description" content="Il repertorio di Mauro Ghilardini: brani, concerti e progetti musicali.">
<meta property="og:url" content="https://mauroghilardini.netlify.app/repertorio/">
<meta property="og:image" content="https://mauroghilardini.netlify.app/images/mauro-01.webp">
<meta property="og:image:alt" content="Mauro Ghilardini">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Repertorio — Mauro Ghilardini">
<meta name="twitter:description" content="Il repertorio di Mauro Ghilardini: brani, concerti e progetti musicali.">
<meta name="twitter:image" content="https://mauroghilardini.netlify.app/images/mauro-01.webp">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js" integrity="sha384-li4UtcFCH6QeUqR4JyV58/VgTprMuz9aauj+oWtew7V4Y7ZVjnvz5px9Y3UCG0Ea" crossorigin="anonymous"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Archivo',system-ui,sans-serif;background:#1c1b18;color:#e7e3d8;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  @keyframes slowzoom{from{transform:scale(1.03)}to{transform:scale(1.12)}}
  ::selection{background:#c2543a;color:#1c1b18;}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:clamp(34px,6vw,90px);}
  @media(max-width:860px){.two{grid-template-columns:1fr;}}
  .gal{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  @media(max-width:680px){.gal{grid-template-columns:1fr;}}
  .credits{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(20px,3vw,44px);}
  @media(max-width:760px){.credits{grid-template-columns:1fr;}}
  [data-reveal]{opacity:0;transform:translateY(24px);transition:opacity 1s ease,transform 1s ease;}
  [data-reveal].visible{opacity:1;transform:none;}
  #page{padding-bottom:84px;}
  #topbar{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:18px clamp(16px,4vw,44px);mix-blend-mode:difference;color:#fff;}
  #topbar a,#topbar span,#topbar button{font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;}
  #topbar .right{display:flex;align-items:center;gap:14px;}
  #topbar button{background:none;border:none;cursor:pointer;color:#fff;padding:4px 2px;}
  #ctabar{position:fixed;left:0;right:0;bottom:0;z-index:60;background:#c2543a;color:#1c1b18;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px clamp(16px,4vw,44px);}
  #ctabar .cta-text{font-family:'EB Garamond',serif;font-style:italic;font-size:clamp(15px,1.5vw,21px);}
  #ctabar .cta-btn{white-space:nowrap;background:#1c1b18;color:#e7e3d8;padding:13px 22px;font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;}
</style>
</head>
<body>

<div id="topbar">
  <a id="homeLink" href="../index.html#repertorio" onclick="event.preventDefault();location.href='../index.html?t='+Date.now()+'#repertorio';" style="display:flex;align-items:center;gap:8px;background:#1c1b18;color:#fff;padding:6px 14px 6px 10px;letter-spacing:.22em;mix-blend-mode:normal;">← <span id="backLabel">Repertorio</span></a>
  <div class="right">
    <button id="btnIt">IT</button>
    <span style="opacity:.5;">/</span>
    <button id="btnEn">EN</button>
  </div>
</div>

<div id="page"></div>

<div id="ctabar" style="display:none;">
  <span class="cta-text" id="ctaText"></span>
  <a class="cta-btn" id="ctaBtn" href="#"></a>
</div>

<script>
(function () {
  const ROOT = '../';
  const params = new URLSearchParams(location.search);
  const slug = params.get('slug') || '';

  let lang = localStorage.getItem('mgh-lang') || 'it';
  let show = null;

  function setLang(l) {
    lang = l;
    localStorage.setItem('mgh-lang', l);
    document.getElementById('btnIt').style.opacity = lang === 'it' ? '1' : '0.45';
    document.getElementById('btnEn').style.opacity = lang === 'en' ? '1' : '0.45';
    if (show) render(show);
  }

  document.getElementById('btnIt').addEventListener('click', () => setLang('it'));
  document.getElementById('btnEn').addEventListener('click', () => setLang('en'));

  function t(field) {
    if (!show) return '';
    const key = field + '_' + lang;
    return show[key] !== undefined ? show[key] : (show[field] || '');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function el(tag, attrs, ...children) {
    const e = document.createElement(tag);
    if (attrs) Object.entries(attrs).forEach(([k,v]) => {
      if (k === 'style') e.style.cssText = v;
      else if (k === 'className') e.className = v;
      else if (k === 'data') Object.entries(v).forEach(([dk,dv]) => e.dataset[dk] = dv);
      else e.setAttribute(k, v);
    });
    children.flat().forEach(c => {
      if (c == null) return;
      e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    });
    return e;
  }

  function initLenis() {
    if (window._lenis) { window._lenis.destroy(); cancelAnimationFrame(window._lenisRaf); }
    if (window.Lenis) {
      window._lenis = new window.Lenis({ duration: 1.15, smoothWheel: true });
      const raf = (t) => { window._lenis.raf(t); window._lenisRaf = requestAnimationFrame(raf); };
      window._lenisRaf = requestAnimationFrame(raf);
    }
  }

  function initReveal() {
    const els = document.querySelectorAll('[data-reveal]');
    if (!('IntersectionObserver' in window)) {
      els.forEach(e => e.classList.add('visible'));
      return;
    }
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: '0px 0px -6% 0px' });
    els.forEach(e => io.observe(e));
    setTimeout(() => els.forEach(e => e.classList.add('visible')), 2500);
  }

  // Iframe creato solo al click (lazy) su youtube-nocookie.com → nessun cookie prima dell'interazione, nessun consenso richiesto.
  function playVideo(e) {
    const wrap = e.currentTarget;
    const id = wrap.dataset.vid;
    wrap.innerHTML = '';
    const f = document.createElement('iframe');
    f.src = 'https://www.youtube-nocookie.com/embed/' + id + '?autoplay=1&rel=0';
    f.title = 'Video';
    f.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
    f.allowFullscreen = true;
    f.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:0;';
    wrap.appendChild(f);
    wrap.onclick = null;
    wrap.style.cursor = 'default';
  }

  function renderBozza(s) {
    const page = document.getElementById('page');
    page.innerHTML = '';

    // Hero placeholder
    const heroImg = s.hero_img
      ? el('img', { src: ROOT + s.hero_img, alt: s.titolo, style: 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:' + (s.hero_position || 'center') + ';filter:contrast(1.06) brightness(.82);animation:slowzoom 26s ease-in-out infinite alternate;' })
      : el('div', { style: 'position:absolute;inset:0;background:#2b2823;' });

    const hero = el('section', { style: 'position:relative;height:100vh;min-height:560px;overflow:hidden;' },
      heroImg,
      el('div', { style: 'position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,19,17,.5),rgba(20,19,17,.05) 32%,rgba(20,19,17,.2) 60%,rgba(20,19,17,.92));' }),
      el('div', { style: 'position:absolute;left:0;right:0;bottom:0;padding:0 clamp(16px,4vw,56px) clamp(34px,6vh,64px);display:flex;flex-direction:column;gap:16px;' },
        el('span', { style: 'font-size:11px;font-weight:600;letter-spacing:.32em;text-transform:uppercase;color:#d9a06a;' }, t('eyebrow')),
        el('h1', { style: 'font-family:\'Anton\',sans-serif;text-transform:uppercase;font-size:clamp(52px,12.5vw,200px);line-height:.88;letter-spacing:-.02em;color:#e7e3d8;' }, s.titolo),
        el('p', { style: 'font-family:\'EB Garamond\',serif;font-style:italic;font-size:clamp(16px,1.6vw,22px);color:rgba(231,227,216,.7);' },
          lang === 'it' ? 'Scheda in preparazione.' : 'Page coming soon.'
        )
      )
    );
    page.appendChild(hero);

    // CTA
    const ctaText = document.getElementById('ctaText');
    const ctaBtn = document.getElementById('ctaBtn');
    const ctaBar = document.getElementById('ctabar');
    ctaText.textContent = lang === 'it' ? 'Vuoi portare questo spettacolo nel tuo spazio?' : 'Want to bring this show to your venue?';
    ctaBtn.textContent = (lang === 'it' ? 'Contattami' : 'Get in touch') + ' →';
    ctaBtn.href = 'mailto:' + s.cta_email + '?subject=' + encodeURIComponent(s.titolo);
    ctaBar.style.display = 'flex';
  }

  function render(s) {
    if (s.bozza) { renderBozza(s); return; }

    const page = document.getElementById('page');
    page.innerHTML = '';
    const sections = [];

    // HERO
    const hero = el('section', { style: 'position:relative;height:100vh;min-height:560px;overflow:hidden;' },
      el('img', { src: ROOT + s.hero_img, alt: s.titolo, style: 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:' + (s.hero_position || 'center') + ';filter:contrast(1.06) brightness(.82);animation:slowzoom 26s ease-in-out infinite alternate;' }),
      el('div', { style: 'position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,19,17,.5),rgba(20,19,17,.05) 32%,rgba(20,19,17,.2) 60%,rgba(20,19,17,.92));' }),
      el('div', { style: 'position:absolute;left:0;right:0;bottom:0;padding:0 clamp(16px,4vw,56px) clamp(34px,6vh,64px);display:flex;flex-direction:column;gap:16px;' },
        el('span', { style: 'font-size:11px;font-weight:600;letter-spacing:.32em;text-transform:uppercase;color:#d9a06a;' }, t('eyebrow')),
        el('h1', { style: 'font-family:\'Anton\',sans-serif;text-transform:uppercase;font-size:clamp(52px,12.5vw,200px);line-height:.88;letter-spacing:-.02em;color:#e7e3d8;' }, s.titolo),
        el('div', { style: 'display:flex;gap:clamp(16px,3vw,40px);flex-wrap:wrap;font-family:\'EB Garamond\',serif;font-size:clamp(15px,1.6vw,20px);color:rgba(231,227,216,.86);' },
          ...[t('forma'), s.durata, t('organico')].filter(Boolean).reduce((acc, item, i, arr) => {
            acc.push(el('span', {}, item));
            if (i < arr.length - 1) acc.push(el('span', { style: 'color:#c2543a;' }, '/'));
            return acc;
          }, [])
        )
      )
    );
    sections.push(hero);

    // SINOSSI
    const synPars = (lang === 'it' ? s.sinossi_it : s.sinossi_en) || [];
    if (synPars.length) {
      const synLeft = el('div', { style: 'position:sticky;top:90px;' },
        el('span', { style: 'display:block;font-size:11px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:#938c7f;margin-bottom:20px;' }, lang === 'it' ? 'La sinossi' : 'Synopsis'),
        el('h2', { style: 'font-family:\'Anton\',sans-serif;text-transform:uppercase;font-size:clamp(30px,4vw,62px);line-height:.96;letter-spacing:-.01em;color:#514d46;' }, t('sinossi_lead'))
      );
      const synRight = el('div', { style: 'display:flex;flex-direction:column;gap:22px;' },
        ...synPars.map((p, i) => el('p', { style: 'font-family:\'EB Garamond\',serif;font-size:' + (i === 0 ? 'clamp(19px,1.7vw,25px)' : 'clamp(17px,1.5vw,21px)') + ';line-height:' + (i === 0 ? '1.55' : '1.62') + ';color:' + (i === 0 ? '#4a463d' : '#5b5649') + ';' }, p))
      );
      const syn = el('section', { style: 'background:#d9d6cc;color:#2b2823;padding:clamp(64px,11vh,150px) clamp(20px,5vw,72px);' },
        el('div', { className: 'two', style: 'align-items:start;' }, synLeft, synRight)
      );
      sections.push(syn);
    }

    // NOTE / PROGETTO
    if (t('progetto_lead') || t('progetto')) {
      const note = el('section', { 'data-reveal': '', style: 'background:#454e5b;color:#e7e3d8;padding:clamp(64px,11vh,150px) clamp(20px,5vw,72px);' },
        el('span', { style: 'display:block;font-size:11px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:#aab0b9;margin-bottom:26px;' }, lang === 'it' ? 'Il progetto' : 'The project'),
        el('p', { style: 'font-family:\'EB Garamond\',serif;font-size:clamp(22px,2.6vw,40px);line-height:1.4;letter-spacing:-.005em;max-width:24ch;color:#e7e3d8;' }, t('progetto_lead')),
        el('p', { style: 'font-family:\'EB Garamond\',serif;font-size:clamp(17px,1.5vw,21px);line-height:1.62;max-width:60ch;margin-top:30px;color:rgba(231,227,216,.86);' }, t('progetto'))
      );
      sections.push(note);
    }

    // LOCANDINA
    if (s.locandina) {
      const locSrc = ROOT + s.locandina;
      const loc = el('section', { style: 'background:#13110f;color:#e7e3d8;padding:clamp(60px,10vh,140px) clamp(20px,5vw,72px);' },
        el('div', { className: 'two', style: 'align-items:center;' },
          el('a', { href: locSrc, target: '_blank', style: 'display:block;box-shadow:0 30px 80px rgba(0,0,0,.6);align-self:center;justify-self:center;max-width:440px;width:100%;' },
            el('img', { src: locSrc, alt: lang === 'it' ? 'Locandina ' + s.titolo : 'Poster ' + s.titolo, style: 'width:100%;display:block;' })
          ),
          el('div', { 'data-reveal': '' },
            el('span', { style: 'display:block;font-size:11px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:#7a7469;margin-bottom:20px;' }, lang === 'it' ? 'La locandina' : 'The poster'),
            el('h2', { style: 'font-family:\'Anton\',sans-serif;text-transform:uppercase;font-size:clamp(30px,4vw,58px);line-height:.96;color:#e7e3d8;' }, t('locandina_titolo')),
            el('p', { style: 'font-family:\'EB Garamond\',serif;font-size:clamp(17px,1.5vw,21px);line-height:1.6;color:rgba(231,227,216,.82);max-width:42ch;margin-top:22px;' }, t('locandina_nota')),
            el('a', { href: locSrc, download: '', style: 'display:inline-flex;align-items:center;gap:10px;margin-top:26px;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:#d9a06a;border-bottom:1px solid rgba(217,160,106,.5);padding-bottom:6px;' },
              '↓ ' + (lang === 'it' ? 'Scarica la locandina' : 'Download the poster')
            )
          )
        )
      );
      sections.push(loc);
    }

    // GALLERIA
    if (s.foto && s.foto.length) {
      const [first, ...rest] = s.foto;
      const galItems = [
        el('div', { style: 'grid-column:1/-1;aspect-ratio:16/7;overflow:hidden;' },
          el('img', { src: ROOT + first, alt: '', style: 'width:100%;height:100%;object-fit:cover;object-position:center 40%;' })
        ),
        ...rest.map(f => el('div', { style: 'aspect-ratio:4/3;overflow:hidden;' },
          el('img', { src: ROOT + f, alt: '', style: 'width:100%;height:100%;object-fit:cover;' })
        ))
      ];
      const gal = el('section', { style: 'background:#1c1b18;padding:clamp(50px,8vh,110px) clamp(16px,4vw,56px);' },
        el('span', { style: 'display:block;font-size:11px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:#7a7469;margin-bottom:24px;' }, lang === 'it' ? 'Dal vivo' : 'Live'),
        el('div', { className: 'gal' }, ...galItems)
      );
      sections.push(gal);
    }

    // VIDEO
    if (s.video && s.video.length) {
      const videoEls = s.video.map(id => {
        const wrap = el('div', { style: 'cursor:pointer;position:relative;aspect-ratio:16/9;overflow:hidden;background:#000;' },
          el('img', { src: ROOT + 'images/thumb-' + id + '.jpg', alt: '', style: 'width:100%;height:100%;object-fit:cover;opacity:.62;' }),
          el('span', { style: 'position:absolute;inset:0;display:grid;place-items:center;pointer-events:none;' },
            el('span', { style: 'width:66px;height:66px;border-radius:50%;border:1px solid rgba(231,227,216,.8);background:rgba(20,19,17,.35);display:grid;place-items:center;color:#e7e3d8;font-size:18px;' }, '▶')
          )
        );
        wrap.dataset.vid = id;
        wrap.addEventListener('click', playVideo);
        return wrap;
      });
      const vid = el('section', { style: 'background:#1c1b18;padding:0 clamp(16px,4vw,56px) clamp(50px,8vh,110px);' },
        el('span', { style: 'display:block;font-size:11px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:#7a7469;margin-bottom:24px;' }, 'Video'),
        el('div', { style: 'display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;' }, ...videoEls),
        el('p', { style: 'margin-top:18px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#7a7469;' }, 'Video incorporati su youtube-nocookie.com · attivati al click · nessun cookie prima dell\'interazione')
      );
      sections.push(vid);
    }

    // CREDITS
    if ((s.cast && s.cast.length) || (s.crew && s.crew.length)) {
      const castEls = (s.cast || []).map(c => el('div', { 'data-reveal': '', style: 'border-top:1px solid #bdb7a8;padding-top:16px;' },
        el('div', { style: 'font-family:\'Anton\',sans-serif;text-transform:uppercase;font-size:clamp(22px,2.4vw,32px);line-height:1;color:#514d46;' }, c.nome),
        el('div', { style: 'font-family:\'EB Garamond\',serif;font-style:italic;font-size:15px;color:#7a7469;margin-top:7px;' }, lang === 'it' ? c.ruolo_it : c.ruolo_en),
        el('div', { style: 'font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#938c7f;margin-top:5px;' }, c.strumenti)
      ));
      const crewEls = (s.crew || []).map(c => el('div', { style: 'display:flex;flex-direction:column;gap:3px;border-top:1px solid #cfc9bb;padding-top:12px;' },
        el('span', { style: 'font-size:10.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:#938c7f;' }, lang === 'it' ? c.ruolo_it : c.ruolo_en),
        el('span', { style: 'font-family:\'EB Garamond\',serif;font-size:clamp(17px,1.5vw,21px);color:#2b2823;' }, c.nome)
      ));
      const credits = el('section', { style: 'background:#d9d6cc;color:#2b2823;padding:clamp(60px,10vh,140px) clamp(20px,5vw,72px);' },
        el('span', { style: 'display:block;font-size:11px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:#938c7f;margin-bottom:30px;' }, lang === 'it' ? 'In scena & crediti' : 'Cast & credits'),
        el('div', { className: 'credits', style: 'margin-bottom:clamp(34px,5vh,56px);' }, ...castEls),
        el('div', { style: 'display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:18px 30px;' }, ...crewEls)
      );
      sections.push(credits);
    }

    // INGAGGIO
    {
      const budgetVal = t('budget') || (lang === 'it' ? 'Su richiesta' : 'On request');
      const matItems = [];
      if (s.locandina) {
        const locLink = el('a', { href: ROOT + s.locandina, download: '', style: 'display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 20px;border:1px solid rgba(231,227,216,.28);' },
          el('span', { style: 'font-family:\'EB Garamond\',serif;font-size:clamp(17px,1.5vw,21px);' }, lang === 'it' ? 'Locandina' : 'Poster'),
          el('span', { style: 'font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#d9a06a;' }, '↓ ' + (lang === 'it' ? 'Scarica' : 'Download'))
        );
        matItems.push(locLink);
      }
      if (s.proposta_pdf) {
        const propostaLabel = s['proposta_label_' + lang] || (lang === 'it' ? 'Proposta commerciale' : 'Commercial proposal');
        matItems.push(el('a', { href: ROOT + s.proposta_pdf, download: '', style: 'display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 20px;border:1px solid rgba(231,227,216,.28);' },
          el('span', { style: 'font-family:\'EB Garamond\',serif;font-size:clamp(17px,1.5vw,21px);' }, propostaLabel),
          el('span', { style: 'font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#d9a06a;' }, '↓ ' + (lang === 'it' ? 'Scarica' : 'Download'))
        ));
      }
      if (s.scheda_tecnica_pdf) {
        matItems.push(el('a', { href: ROOT + s.scheda_tecnica_pdf, download: '', style: 'display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 20px;border:1px solid rgba(231,227,216,.28);' },
          el('span', { style: 'font-family:\'EB Garamond\',serif;font-size:clamp(17px,1.5vw,21px);' }, lang === 'it' ? 'Scheda tecnica' : 'Technical rider'),
          el('span', { style: 'font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#d9a06a;' }, '↓ ' + (lang === 'it' ? 'Scarica' : 'Download'))
        ));
      } else {
        const nota = t('scheda_tecnica_nota');
        matItems.push(el('div', { style: 'padding:18px 20px;border:1px dashed rgba(231,227,216,.2);font-family:\'EB Garamond\',serif;font-style:italic;font-size:15px;color:rgba(231,227,216,.55);' }, nota || (lang === 'it' ? 'Scheda tecnica disponibile su richiesta.' : 'Technical rider available on request.')));
      }

      const ingaggio = el('section', { style: 'background:#1c1b18;color:#e7e3d8;padding:clamp(60px,10vh,140px) clamp(20px,5vw,72px);' },
        el('div', { className: 'two' },
          el('div', { 'data-reveal': '' },
            el('span', { style: 'display:block;font-size:11px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:#7a7469;margin-bottom:18px;' }, lang === 'it' ? 'Ingaggio' : 'Fee'),
            el('div', { style: 'font-family:\'Anton\',sans-serif;text-transform:uppercase;font-size:clamp(40px,6vw,90px);line-height:.9;color:#c2543a;' }, budgetVal),
            el('p', { style: 'font-family:\'EB Garamond\',serif;font-size:clamp(16px,1.4vw,20px);line-height:1.55;color:rgba(231,227,216,.78);max-width:42ch;margin-top:18px;' }, t('budget_nota'))
          ),
          el('div', { 'data-reveal': '' },
            el('span', { style: 'display:block;font-size:11px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:#7a7469;margin-bottom:18px;' }, lang === 'it' ? 'Materiali' : 'Materials'),
            el('div', { style: 'display:flex;flex-direction:column;gap:12px;' }, ...matItems)
          )
        )
      );
      sections.push(ingaggio);
    }

    sections.forEach(s => page.appendChild(s));

    // CTA bar
    const ctaText = document.getElementById('ctaText');
    const ctaBtn = document.getElementById('ctaBtn');
    const ctaBar = document.getElementById('ctabar');
    ctaText.textContent = lang === 'it'
      ? 'Vuoi portare «' + s.titolo + '» nel tuo spazio?'
      : 'Want to bring «' + s.titolo + '» to your venue?';
    ctaBtn.textContent = (lang === 'it' ? 'Contattami' : 'Get in touch') + ' →';
    ctaBtn.href = 'mailto:' + s.cta_email + '?subject=' + encodeURIComponent(s.titolo);
    ctaBar.style.display = 'flex';

    setTimeout(() => { initReveal(); initLenis(); }, 50);
  }

  // Load data — try per-file first, fall back to array
  function loadAndRender() {
    fetch('../data/spettacoli/' + slug + '.json')
      .then(r => { if (!r.ok) throw new Error('not found'); return r.json(); })
      .catch(() => fetch('../data/spettacoli.json').then(r => r.json()).then(arr => {
        const found = arr.find(s => s.slug === slug);
        if (!found) throw new Error('slug not found');
        return found;
      }))
      .then(s => {
        show = s;
        document.title = s.titolo + ' — Mauro Ghilardini';
        setLang(lang);
        render(s);
      })
      .catch(() => {
        document.getElementById('page').innerHTML = '<div style="padding:200px 40px;text-align:center;font-family:\'EB Garamond\',serif;font-size:24px;color:#7a7469;">Spettacolo non trovato.</div>';
      });
  }

  setLang(lang);
  loadAndRender();
})();
</script>
</body>
</html>
