<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Creazione · Mauro Ghilardini</title>
<meta name="description" content="Il repertorio di Mauro Ghilardini: teatro musicale, concerti, letture, composizioni. Bergamo.">
<meta property="og:type"        content="website">
<meta property="og:url"         content="https://mauroghilardini.it/vesper.html">
<meta property="og:title"       content="Creazione · Mauro Ghilardini">
<meta property="og:description" content="Il repertorio di Mauro Ghilardini: teatro musicale, concerti, letture, composizioni. Bergamo.">
<meta property="og:image"       content="https://mauroghilardini.it/images/og-vesper.jpg">
<meta property="og:locale"      content="it_IT">
<meta name="twitter:card"       content="summary_large_image">
<link rel="canonical"           href="https://mauroghilardini.it/vesper.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #f4f0e7; --ink: #23211c; --ink2: #5c574d; --faint: #a09a8c;
  --line: #ddd6c8; --line2: #e6e0d3; --accent: #3f5aa6;
  --ser: 'Crimson Pro', Georgia, serif; --gro: 'Archivo', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: var(--cream); color: var(--ink); font-family: var(--gro); overflow: hidden; overflow-y: auto; }
a { color: inherit; text-decoration: none; }
.brush { position: absolute; z-index: 1; mix-blend-mode: multiply; pointer-events: none;
  left: 46%; top: 50%; width: 78vh; min-width: 680px; transform: translate(-50%,-50%);
  transform-origin: center;
  transition: top 1s cubic-bezier(.66,0,.2,1), opacity 1s ease, filter 1s ease; }
.chrome { position: absolute; top: 34px; left: 52px; display: flex; align-items: center; gap: 16px; z-index: 4; }
.back-circle { width: 38px; height: 38px; border: 1px solid var(--accent); border-radius: 50%;
  display: grid; place-items: center; color: var(--accent); font-size: 15px; cursor: pointer;
  text-decoration: none; transition: background .2s, color .2s; flex: none; }
.back-circle:hover { background: var(--accent); color: var(--cream); }
.wordmark { font-family: var(--gro); font-size: 12px; font-weight: 600; letter-spacing: .42em; text-transform: uppercase; }
.chrome-right { position: absolute; top: 38px; right: 56px; font-family: var(--gro); font-size: 10px;
  font-weight: 600; letter-spacing: .34em; text-transform: uppercase; color: var(--faint); z-index: 4; }
.layout { position: relative; z-index: 3; display: grid;
  grid-template-columns: clamp(420px, 40vw, 560px) 1fr;
  gap: 48px; align-items: start; min-height: 100vh; padding: 118px 56px 56px; }
.tracklist { max-width: 520px; }
.tl-title { font-family: var(--ser); font-weight: 300; font-size: clamp(48px, 6vh, 64px); line-height: 1; margin: 0 0 6px; }
.tl-sub { font-family: var(--ser); font-style: italic; font-weight: 300; font-size: 17px; color: var(--ink2); margin-bottom: 30px; }
.section-label { font-family: var(--gro); font-size: 9.5px; font-weight: 600; letter-spacing: .28em; text-transform: uppercase; color: var(--faint); margin-bottom: 4px; }
.track-list + .section-label { margin-top: 22px; }
.track-list { list-style: none; }
.trk { display: grid; grid-template-columns: 26px 18px 1fr; align-items: baseline; column-gap: 12px; padding: 9px 0; border-top: 1px solid var(--line2); cursor: pointer; }
.trk:last-child { border-bottom: 1px solid var(--line2); }
.trk-num { font-family: var(--gro); font-size: 10px; font-weight: 600; letter-spacing: .06em; color: var(--faint); transition: color .2s; }
.trk-dash { width: 14px; height: 2px; background: var(--line); align-self: center; transition: background .2s; }
.trk-name { font-family: var(--ser); font-size: 19px; color: var(--ink2); transition: color .2s; }
.trk-meta { font-family: var(--gro); font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--faint); margin-left: 10px; }
.trk:hover .trk-name { color: var(--ink); }
.trk:hover .trk-dash { background: var(--accent); }
.trk.is-active .trk-num { color: var(--accent); }
.trk.is-active .trk-dash { background: var(--accent); }
.trk.is-active .trk-name { color: var(--ink); }
.active-voice { display: flex; flex-direction: column; justify-content: center; max-width: 520px; justify-self: end; }
.active-voice-inner { background: linear-gradient(90deg, rgba(244,240,231,0), rgba(244,240,231,.94) 22%);
  padding: 40px 0 40px 56px; margin-left: -56px; opacity: 1; transition: opacity .22s ease; }
.active-voice-inner.is-fading { opacity: 0; }
.av-group { font-family: var(--gro); font-size: 11px; font-weight: 600; letter-spacing: .32em; text-transform: uppercase; color: var(--accent); }
.av-name { font-family: var(--ser); font-weight: 300; font-size: clamp(44px, 6vh, 58px); line-height: 1; color: var(--ink); margin: 14px 0 0; }
.av-meta { font-family: var(--gro); font-size: 11px; font-weight: 600; letter-spacing: .18em; text-transform: uppercase; color: var(--ink2); margin-top: 18px; }
.av-rule { width: 60px; height: 3px; background: var(--accent); margin: 24px 0; }
.av-desc { font-family: var(--ser); font-weight: 300; font-size: 19px; line-height: 1.66; color: var(--ink2); max-width: 44ch; }
.av-desc em { font-style: italic; }
.av-links { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 30px; }
.av-link { font-family: var(--gro); font-size: 10px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase;
  color: var(--ink2); border-bottom: 1px solid var(--line); padding-bottom: 5px; text-decoration: none; transition: color .2s, border-color .2s; }
.av-link:hover { color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>
<img class="brush" id="brush" src="images/cut/vesper.png" alt="" aria-hidden="true">
<div class="chrome">
  <a class="back-circle" href="index.html" aria-label="Torna indietro">←</a>
  <span class="wordmark">Mauro Ghilardini</span>
</div>
<div class="chrome-right" id="chromeRight" aria-hidden="true">Creazione · I</div>
<div class="layout">
  <div class="tracklist">
    <h1 class="tl-title">Creazione</h1>
    <p class="tl-sub">Il repertorio — teatro, concerti, musica</p>
    <div class="section-label">Teatro e letture</div>
    <ul class="track-list" id="listTeat"></ul>
    <div class="section-label">Concerti e format</div>
    <ul class="track-list" id="listConc"></ul>
  </div>
  <div class="active-voice">
    <div class="active-voice-inner" id="activeVoice">
      <div class="av-group" id="avGroup"></div>
      <h2 class="av-name" id="avName"></h2>
      <div class="av-meta" id="avMeta"></div>
      <div class="av-rule"></div>
      <p class="av-desc" id="avDesc"></p>
      <div class="av-links" id="avLinks"></div>
    </div>
  </div>
</div>
<script>
(function () {
  'use strict';
  var ROM = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV'];

  var TEAT = [
    { name:'Parabole di un Clown', meta:'Teatro sacro · con Francesco Maffeis · In repertorio',
      desc:'Spettacolo di teatro sacro per cui ha composto le musiche insieme al M° Francesco Maffeis. Dal lavoro è nato nel 2012 il CD <em>In viaggio…</em>. In repertorio.', links:[] },
    { name:'Dormono sulla Collina', meta:'Lettura musicale · da cui è nato il libro',
      desc:'Testo e messa in scena intrecciati all\'<em>Antologia di Spoon River</em> di Masters e alle canzoni di De André. Da questo lavoro è nato nel 2024 il libro pubblicato da Phronesis.',
      links:[{label:'Il libro', href:'https://amzn.to/4unKNtP'}] },
    { name:'Sergente nella Neve', meta:'Lettura laica · con R. Squinzi e F. Maffeis · In repertorio',
      desc:'Rigoni Stern messo in voce: il gelo della ritirata, la fame, l\'umano che resta. Lettura per voce e musica dal vivo.', links:[] },
    { name:'Vita da Cantautrice', meta:'Lettura-concerto · con Miriam Gotti e F. Maffeis',
      desc:'Una vita in canzoni: voce femminile, racconto e pianoforte intrecciati in un ritratto d\'autrice.', links:[] },
    { name:'Là, dove nasce l\'acqua', meta:'Lettura · con Luca Giudici',
      desc:'Una lettura che risale alla sorgente: parole e suono che cercano il punto dove tutto comincia.', links:[] },
    { name:'Robin Hood', meta:'Lettura per bambini · con Luca Giudici',
      desc:'La foresta di Sherwood per i più piccoli: avventura, frecce e giustizia, raccontate con voce e musica.', links:[] },
    { name:'Gli Angeli del Natale', meta:'Lettura sacra · per ragazzi · con Luca Giudici',
      desc:'Il racconto del Natale affidato agli angeli: una lettura per bambini e ragazzi, nel tempo dell\'attesa.', links:[] },
    { name:'Luca', meta:'Lettura laica · in scrittura · anche regia',
      desc:'La prossima, ancora sul tavolo: testo e regia miei. Un cantiere aperto di cui custodisco l\'inizio.', links:[] },
  ];

  var CONC = [
    { name:'Sushi Cornucopia', meta:'Band · Tra il serio e il faceto · Su richiesta',
      desc:'Un ensemble che gioca a smontarsi da solo: repertorio serio servito con il sorriso, e leggerezza che nasconde mestiere. Si tiene ovunque ci sia un palco.', links:[] },
    { name:'Queen at Wembley', meta:'Tributo · con i Lydian · Su richiesta',
      desc:'La grande notte dei Queen riportata a teatro: voce, band e la liturgia di un concerto che tutti ricordano. Tributo costruito sul filo del live.', links:[] },
    { name:'Live Aid Tribute', meta:'Tributo · con i Lydian · Su richiesta',
      desc:'Il 1985 che fermò il mondo, rimesso in fila brano dopo brano. Un viaggio dentro la giornata che inventò il concerto-evento.', links:[] },
    { name:'I Maestri Cantori d\'Italia', meta:'Duo · voce e pianoforte · con Francesco Maffeis',
      desc:'Progetto in corso: la grande canzone d\'autore italiana riletta in voce e pianoforte. Un percorso che cresce serata dopo serata.', links:[] },
    { name:'Al primo accordo', meta:'Duo · voce e chitarra · con Simone Trevisan',
      desc:'Un percorso scritto su misura per un concerto di luglio — il primo, spero, di molti. Programma in costruzione, cucito sull\'occasione.', links:[] },
    { name:'Orizzonti Acustici', meta:'Duo · con Giorgio Sala · Chitarra e voce',
      desc:'Due voci e le corde, niente di più: un concerto acustico che cerca la linea dell\'orizzonte tra canzone e silenzio.', links:[] },
  ];

  var FLAT = TEAT.map(function(e,i){return{group:'Teatro e letture',rom:ROM[i],entry:e};})
    .concat(CONC.map(function(e,i){return{group:'Concerti e format',rom:ROM[i],entry:e};}));

  var TOTAL = FLAT.length, sel = 0;
  var brush       = document.getElementById('brush'),
      avGroup     = document.getElementById('avGroup'),
      avName      = document.getElementById('avName'),
      avMeta      = document.getElementById('avMeta'),
      avDesc      = document.getElementById('avDesc'),
      avLinks     = document.getElementById('avLinks'),
      avVoice     = document.getElementById('activeVoice'),
      chromeRight = document.getElementById('chromeRight');

  function r2(x){ return Math.round(x*100)/100; }
  function updateBrush(d){
    brush.style.top     = r2(22 + d * 56) + '%';
    brush.style.opacity = r2(.45 + .4*d);
    brush.style.filter  = 'saturate(' + r2(.8 + d*.5) + ')';
  }
  function renderLinks(links){
    avLinks.innerHTML = '';
    links.forEach(function(lk){
      var a = document.createElement('a'); a.className = 'av-link'; a.href = lk.href;
      a.target = '_blank'; a.rel = 'noopener'; a.textContent = lk.label + ' →';
      avLinks.appendChild(a);
    });
  }
  function updateDetail(flat, instant){
    var e = flat.entry;
    var apply = function(){
      avGroup.textContent = flat.group + ' · ' + flat.rom;
      avName.textContent  = e.name;
      avMeta.textContent  = e.meta;
      avDesc.innerHTML    = e.desc;
      renderLinks(e.links);
      chromeRight.textContent = 'Creazione · ' + flat.rom;
    };
    if(instant){ apply(); return; }
    avVoice.classList.add('is-fading');
    setTimeout(function(){ apply(); avVoice.classList.remove('is-fading'); }, 160);
  }
  function pick(idx, instant){
    sel = idx;
    updateBrush(TOTAL > 1 ? sel/(TOTAL-1) : 0);
    updateDetail(FLAT[sel], instant);
    document.querySelectorAll('.trk').forEach(function(el,i){ el.classList.toggle('is-active', i===sel); });
  }
  function buildList(listEl, items, offset){
    items.forEach(function(e, i){
      var li = document.createElement('li'); li.className = 'trk';
      li.setAttribute('tabindex','0'); li.setAttribute('role','button');
      li.innerHTML = '<span class="trk-num">'+ROM[i]+'</span><span class="trk-dash"></span>'
        +'<span><span class="trk-name">'+e.name+'</span><span class="trk-meta">'+e.meta+'</span></span>';
      var idx = offset + i;
      li.addEventListener('click', function(){ pick(idx, false); });
      li.addEventListener('keydown', function(ev){ if(ev.key==='Enter'||ev.key===' '){ ev.preventDefault(); pick(idx, false); } });
      listEl.appendChild(li);
    });
  }
  buildList(document.getElementById('listTeat'), TEAT, 0);
  buildList(document.getElementById('listConc'), CONC, TEAT.length);

  document.addEventListener('keydown', function(ev){
    if(!ev.target.classList.contains('trk')) return;
    var all = document.querySelectorAll('.trk');
    if(ev.key==='ArrowDown'){ ev.preventDefault(); pick(Math.min(sel+1,TOTAL-1),false); if(all[sel]) all[sel].focus(); }
    else if(ev.key==='ArrowUp'){ ev.preventDefault(); pick(Math.max(sel-1,0),false); if(all[sel]) all[sel].focus(); }
  });
  pick(0, true);
})();
</script>
</body>
</html>
