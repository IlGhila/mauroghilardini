<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:#f4f0e7;
  color:#23211c;
  font-family:'Archivo',system-ui,sans-serif;
  overflow-x:hidden;
  display:flex;
  flex-direction:column;
  min-height:100%;
}

/* ── chrome top ── */
.chrome-top{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;
  padding:28px 48px;
  pointer-events:none;
}
.chrome-name{
  font-size:12px;font-weight:600;letter-spacing:.42em;text-transform:uppercase;
  color:#23211c;flex:1;
}
.chrome-atlas{
  font-size:9.5px;font-weight:500;letter-spacing:.34em;text-transform:uppercase;
  color:#a09a8c;margin-right:68px;
}

/* ── hamburger ── */
.hamburger{
  position:fixed;top:18px;right:36px;z-index:200;
  width:44px;height:44px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  background:none;border:none;cursor:pointer;padding:10px;
}
.hamburger span{
  display:block;width:22px;height:1.5px;background:#23211c;
  transition:transform .28s ease,opacity .2s ease;
}
.hamburger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);}

/* ── stage ── */
.stage{
  flex:1;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  padding:88px 0 80px;
}

/* ── matassa ── */
.matassa{
  position:relative;
  width:min(88vmin,960px);
  height:min(88vmin,960px);
}
.stroke{
  position:absolute;
  transform-origin:center;
  mix-blend-mode:multiply;
  pointer-events:none;
  user-select:none;
  opacity:0;
  transition:opacity .35s ease;
}
.stroke.visible{
  opacity:1;
}
.stroke.dim{
  opacity:0.16;
}
.hit-canvas{
  position:absolute;inset:0;
  pointer-events:auto;
  z-index:20;
  cursor:default;
  /* transparent — only for event capture */
}

/* ── chrome bottom ── */
.chrome-foot{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 44px 26px;gap:7px;
  pointer-events:none;
}
.craft-list{
  font-family:'Crimson Pro',Georgia,serif;
  font-style:italic;font-weight:300;font-size:15px;
  color:#5c574d;text-align:center;
  letter-spacing:.01em;
}
.craft-item, .craft-sep{
  display:inline-block;
  transition:transform .25s ease, color .25s ease, opacity .25s ease, font-size .25s ease, letter-spacing .25s ease;
  transform-origin:center bottom;
}
.craft-item.craft-active{
  transform:scale(1.22);
  font-weight:400;
}
.craft-item.craft-dim, .craft-sep.craft-dim{
  opacity:0;
  font-size:0;
  letter-spacing:0;
}
.chrome-city{
  font-size:9.5px;font-weight:500;letter-spacing:.32em;text-transform:uppercase;
  color:#a09a8c;
}

/* ── menu overlay ── */
.menu{
  position:fixed;inset:0;z-index:150;
  background:rgba(244,240,231,.97);
  backdrop-filter:blur(2px);
  display:flex;flex-direction:column;justify-content:center;
  padding:0 11vw;
  opacity:0;pointer-events:none;
  transition:opacity .28s ease;
}
.menu.open{opacity:1;pointer-events:auto;}

.menu-label{
  font-size:10px;font-weight:600;letter-spacing:.36em;text-transform:uppercase;
  color:#a09a8c;margin-bottom:20px;
}
.menu-item{
  display:grid;
  grid-template-columns:32px 40px 1fr;
  align-items:center;gap:20px;
  padding:16px 0;
  border-top:1px solid #ddd6c8;
  text-decoration:none;color:inherit;
  transition:opacity .15s;
}
.menu-item:last-of-type{border-bottom:1px solid #ddd6c8;}
.menu-item:hover{opacity:.65;}
.menu-item-rom{
  font-family:'Archivo',sans-serif;font-size:10px;
  color:#a09a8c;font-weight:500;letter-spacing:.06em;
}
.menu-item-dash{height:3px;}
.menu-item-name{
  font-size:14px;font-weight:500;
  letter-spacing:.26em;text-transform:uppercase;
  color:#23211c;
}
.menu-close{
  position:absolute;top:28px;right:44px;
  background:none;border:none;cursor:pointer;
  font-family:'Archivo',sans-serif;
  font-size:12px;letter-spacing:.1em;
  color:#23211c;padding:6px;
}

/* ── sigillo (pennellata che viaggia) ── */
#sigilloEl{
  display:none;
  position:fixed;
  mix-blend-mode:multiply;
  pointer-events:none;
  z-index:50;
  transform-origin:center;
}

/* ── pulsante indietro ── */
.world-back{
  position:fixed;
  top:26px;left:26px;z-index:60;
  width:44px;height:44px;
  border-radius:50%;
  border:1.5px solid var(--rc,#888);
  background:none;cursor:pointer;
  display:none;place-items:center;
  font-size:17px;line-height:1;
  color:var(--rc,#888);
  transition:opacity .2s;
}
.world-back.visible{display:grid;}
.world-back:hover{opacity:.6;}

/* ── pannello mondo ── */
.world-panel{
  position:fixed;
  top:0;right:0;bottom:0;
  left:50vw;
  z-index:45;
  display:flex;flex-direction:column;justify-content:center;
  padding:88px 6vw 60px;
  opacity:0;pointer-events:none;
  transition:opacity .7s ease;
}
.world-panel.visible{opacity:1;pointer-events:auto;}

.world-rom{
  font-family:'Archivo',sans-serif;
  font-size:11px;font-weight:600;letter-spacing:.36em;text-transform:uppercase;
  color:var(--rc,#888);margin-bottom:16px;
}
.world-title{
  font-family:'Crimson Pro',Georgia,serif;
  font-weight:300;font-size:clamp(44px,5vw,74px);
  letter-spacing:.01em;line-height:1;
  color:#23211c;
}
.world-rule{
  width:64px;height:3px;
  background:var(--rc,#888);
  margin:26px 0;
}
.world-desc{
  font-family:'Crimson Pro',Georgia,serif;
  font-weight:300;font-size:clamp(17px,1.5vw,21px);
  line-height:1.68;color:#5c574d;max-width:44ch;
}
.world-action{
  display:inline-flex;align-items:center;gap:10px;
  margin-top:36px;align-self:flex-start;
  font-family:'Archivo',sans-serif;
  font-size:11px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;
  color:#23211c;
  border:1.5px solid var(--rc,#888);
  padding:13px 22px;
  text-decoration:none;
  transition:background .22s,color .22s;
}
.world-action:hover{background:var(--rc,#888);color:#f4f0e7;}

@media(max-width:820px){
  .world-panel{left:0;top:52vw;padding:24px 7vw 80px;}
  .world-back{top:20px;left:20px;}
}

/* ── soglia hint ── */
.hint{
  position:fixed;bottom:68px;left:0;right:0;z-index:100;
  text-align:center;
  font-size:9.5px;font-weight:500;letter-spacing:.3em;text-transform:uppercase;
  color:#c8c2b5;
  pointer-events:none;
}

@media(max-width:820px){
  .stage{
    align-items:flex-start;
    padding-top:68px;
    min-height:auto;
  }
  .matassa{
    width:min(95vw,520px);
    height:min(95vw,520px);
  }
}
@media(max-width:600px){
  .chrome-top{padding:20px 24px;}
  .chrome-atlas{display:none;}
  .hamburger{top:12px;right:12px;}
  .chrome-foot{padding:0 20px 14px;}
  .craft-list{font-size:13px;}
  .hint{display:none;}
  .menu{padding:0 8vw;}
  .menu-label{margin-bottom:12px;}
  .menu-item{gap:14px;padding:14px 0;}
  .menu-item-name{font-size:13px;}
}
</style>
</head>
<body>

<header class="chrome-top" aria-label="Intestazione">
  <span class="chrome-name">Mauro Ghilardini</span>
  <span class="chrome-atlas" aria-hidden="true">Atlante · VII</span>
</header>

<button class="hamburger" id="hamburger" aria-label="Apri menu" aria-expanded="false">
  <span></span><span></span><span></span>
</button>

<main class="stage">
  <div class="matassa" id="matassa" role="navigation" aria-label="Scegli una voce">
    <canvas class="hit-canvas" id="hitCanvas" aria-hidden="true"></canvas>
  </div>
</main>

<footer class="chrome-foot" aria-label="Piè di pagina">
  <span class="craft-list" id="craftList"></span>
  <span class="chrome-city">Bergamo · MMXXVI</span>
</footer>

<div class="hint" aria-hidden="true"
  data-en="choose a colour — enter"
>scegli un colore — entra</div>

<!-- pennellata che viaggia dal logo al sigillo -->
<img id="sigilloEl" src="" alt="" aria-hidden="true">

<!-- pulsante indietro (appare nel mondo) -->
<button class="world-back" id="worldBack" aria-label="Torna all'Atlante">←</button>

<!-- pannello mondo (destra) -->
<div class="world-panel" id="worldPanel" aria-hidden="true">
  <div class="world-rom"    id="wRom"></div>
  <h2  class="world-title"  id="wTitle"></h2>
  <div class="world-rule"></div>
  <p   class="world-desc"   id="wDesc"></p>
  <a   class="world-action" id="wAction" href="#">—</a>
</div>

<nav class="menu" id="menu" aria-label="Menu" aria-hidden="true">
  <div class="menu-label" data-en="The pages">Le pagine</div>
  <!-- items injected by atlante.js -->
  <button class="menu-close" id="menuClose" aria-label="Chiudi menu">chiudi ✕</button>
</nav>

<script src="lang.js"></script>
<script src="atlante.js"></script>
</body>
</html>
